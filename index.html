<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福山匿名投稿</title>
    <!-- 載入必要套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f7fee7; /* 溫暖的淡綠色背景 */
            /* 背景裝飾：更細緻的格紋感 */
            background-image: 
                radial-gradient(#d9f99d 0.8px, transparent 0.8px),
                linear-gradient(to right, #f1f8e4 1px, transparent 1px),
                linear-gradient(to bottom, #f1f8e4 1px, transparent 1px);
            background-size: 24px 24px, 24px 24px, 24px 24px;
        }
        
        .avatar-ring {
            position: relative;
            background: #ffffff; 
            border-radius: 16px; 
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            border: 1.5px solid #ecf3e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .avatar-img-wrapper {
            position: relative;
            border-radius: 12px; 
            width: 36px;
            height: 36px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -12px rgba(101, 163, 13, 0.08);
        }
        
        .post-card:hover { 
            transform: translateY(-4px) scale(1.01);
            border-color: #10b981; 
            box-shadow: 0 20px 40px -15px rgba(16, 185, 129, 0.15);
        }

        /* 呼吸燈效果 */
        .status-pulse {
            position: relative;
        }
        .status-pulse::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
            100% { opacity: 0.3; transform: translateY(-50%) scale(0.8); }
        }

        .forum-logo-custom {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="pb-32">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                plus: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                logout: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
                user: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
                x: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
                refresh: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
                instagram: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>,
                mainLogo: (
                    <div className="forum-logo-custom">
                        <svg viewBox="0 0 100 100" className="w-12 h-12 drop-shadow-md">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stopColor="#10b981" />
                                    <stop offset="100%" stopColor="#059669" />
                                </linearGradient>
                            </defs>
                            <circle cx="50" cy="50" r="46" fill="url(#logoGrad)" />
                            <path d="M22 38 C22 28 28 22 48 22 C68 22 78 28 78 38 C78 55 78 62 78 68 C78 74 72 78 62 78 L55 78 L45 88 L45 78 C32 78 22 74 22 65 Z" fill="white" fillOpacity="0.9" />
                            <text x="50" y="58" fontFamily="system-ui, sans-serif" fontSize="15" fontWeight="900" fill="#065f46" textAnchor="middle" letterSpacing="-0.5">FSJH</text>
                        </svg>
                    </div>
                )
            };
            return icons[name] || null;
        };

        const API_URL = "https://script.google.com/macros/s/AKfycbxNIWjUyOdZM3vvHR9uMdfADYwPnsRJvntQTtoZlBmWj_E_w2L6v8hH_sV4urAYPe-ylw/exec";
        const GOOGLE_CLIENT_ID = "511878323230-0uvd7colr8df751ujpjv9e7trmvp8amm.apps.googleusercontent.com";

        const App = () => {
            const [currentUser, setCurrentUser] = useState(JSON.parse(localStorage.getItem('fushan_user')) || null);
            const [allPosts, setAllPosts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [status, setStatus] = useState('已連線');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('login'); 
            const [showUserMenu, setShowUserMenu] = useState(false);

            const [postContent, setPostContent] = useState('');
            const [isAnon, setIsAnon] = useState(false);
            const [isSending, setIsSending] = useState(false);

            useEffect(() => {
                loadFeed();
                window.handleCredentialResponse = (response) => {
                    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                    const savedIg = localStorage.getItem(`fushan_ig_${payload.email}`) || '未設定';
                    const user = { 
                        name: payload.name, 
                        email: payload.email, 
                        picture: payload.picture,
                        ig: savedIg
                    };
                    setCurrentUser(user);
                    localStorage.setItem('fushan_user', JSON.stringify(user));
                    setShowModal(false);
                };
            }, []);

            useEffect(() => {
                if (showModal && modalType === 'login') {
                    const interval = setInterval(() => {
                        if (window.google) {
                            window.google.accounts.id.initialize({
                                client_id: GOOGLE_CLIENT_ID,
                                callback: window.handleCredentialResponse
                            });
                            const btnElem = document.getElementById('google-signin-btn');
                            if (btnElem) {
                                window.google.accounts.id.renderButton(btnElem, {
                                    type: "standard",
                                    shape: "pill",
                                    theme: "filled_black",
                                    text: "signin_with",
                                    size: "large",
                                    width: 280
                                });
                                clearInterval(interval);
                            }
                        }
                    }, 100);
                    return () => clearInterval(interval);
                }
            }, [showModal, modalType]);

            const loadFeed = async () => {
                setStatus('同步中');
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    setAllPosts(Array.isArray(data) ? data : []);
                    setIsLoading(false);
                    setStatus('已更新');
                } catch (e) {
                    setStatus('連線異常');
                    setIsLoading(false);
                }
            };

            const handlePost = async () => {
                if (!postContent.trim()) return;
                setIsSending(true);
                const data = {
                    action: "add",
                    id: Date.now().toString(),
                    author: currentUser.name,
                    sid: currentUser.email,
                    ig: currentUser.ig || "未設定",
                    cat: "通用",
                    content: postContent,
                    isAnon: isAnon,
                    date: new Date().toLocaleString('zh-TW', { hour12: false })
                };
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    setPostContent('');
                    setShowModal(false);
                    setIsSending(false);
                    setTimeout(loadFeed, 500);
                } catch (e) {
                    setIsSending(false);
                }
            };

            const handleDelete = async (postId) => {
                if (!confirm("確定要刪除這則投稿嗎？")) return;
                setStatus('刪除中');
                try {
                    await fetch(API_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ action: "delete", id: postId, userEmail: currentUser.email }) 
                    });
                    setTimeout(loadFeed, 1000);
                } catch (e) { }
            };

            const saveIG = (newIg) => {
                const updatedUser = { ...currentUser, ig: newIg };
                setCurrentUser(updatedUser);
                localStorage.setItem('fushan_user', JSON.stringify(updatedUser));
                localStorage.setItem(`fushan_ig_${currentUser.email}`, newIg);
                setShowModal(false);
            };

            return (
                <div className="min-h-screen pb-24 antialiased text-slate-800">
                    <nav className="sticky top-0 bg-white/70 backdrop-blur-xl border-b border-lime-200/50 px-6 py-4 z-40">
                        <div className="max-w-xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})}>
                                <Icon name="mainLogo" />
                                <div className="flex flex-col">
                                    <h1 className="font-black text-xl text-slate-900 tracking-tighter leading-none">福山匿名投稿</h1>
                                    <div className="flex items-center mt-2 ml-4">
                                        <span className="text-[9px] font-black text-emerald-600 uppercase tracking-[0.2em] leading-none status-pulse">{status}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="relative">
                                <button onClick={() => currentUser ? setShowUserMenu(!showUserMenu) : (setModalType('login'), setShowModal(true))} className="avatar-ring hover:border-emerald-300 hover:scale-105 transition-all active:scale-95 shadow-sm">
                                    <div className="avatar-img-wrapper" style={{ backgroundColor: currentUser ? 'transparent' : '#f8fafc' }}>
                                        {currentUser ? (
                                            <img src={currentUser.picture} alt="profile" className="w-full h-full object-cover" />
                                        ) : (
                                            <Icon name="user" className="w-5 h-5 text-slate-300" />
                                        )}
                                    </div>
                                </button>
                                {currentUser && showUserMenu && (
                                    <div className="absolute right-0 mt-3 w-60 bg-white rounded-[32px] shadow-2xl shadow-emerald-900/15 border border-emerald-50 py-2 z-50 overflow-hidden animate-in slide-in-from-top-2 duration-200">
                                        <div className="px-6 py-5 border-b border-slate-50 mb-1 bg-emerald-50/30">
                                            <p className="text-sm font-black text-slate-900 truncate">{currentUser.name}</p>
                                            <p className="text-[11px] font-bold text-slate-400 truncate mt-0.5">{currentUser.email}</p>
                                        </div>
                                        <button onClick={() => { setModalType('settings'); setShowModal(true); setShowUserMenu(false); }} className="w-full flex items-center space-x-3 px-6 py-3.5 text-sm text-slate-600 hover:bg-emerald-50 transition-colors font-bold">
                                            <Icon name="settings" className="w-4 h-4 text-emerald-500" /> <span>個人帳號設定</span>
                                        </button>
                                        <button onClick={() => { localStorage.removeItem('fushan_user'); setCurrentUser(null); setShowUserMenu(false); }} className="w-full flex items-center space-x-3 px-6 py-3.5 text-sm text-red-500 hover:bg-red-50 transition-colors font-bold border-t border-slate-50 mt-1">
                                            <Icon name="logout" className="w-4 h-4" /> <span>登出系統</span>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-xl mx-auto p-6 space-y-8">
                        {isLoading ? (
                            <div className="text-center py-32">
                                <div className="inline-block relative w-12 h-12">
                                    <div className="absolute inset-0 border-4 border-emerald-100 rounded-full"></div>
                                    <div className="absolute inset-0 border-4 border-emerald-500 rounded-full border-t-transparent animate-spin"></div>
                                </div>
                                <p className="text-xs font-black text-emerald-600/40 mt-6 tracking-widest">正在從雲端同步投稿內容...</p>
                            </div>
                        ) : (
                            allPosts.slice().reverse().map(p => (
                                <div key={p.id} className="post-card p-8 group">
                                    <div className="flex justify-between items-start mb-6">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-12 h-12 rounded-2xl bg-white border border-lime-100 flex items-center justify-center overflow-hidden shadow-sm group-hover:shadow-md transition-all group-hover:border-emerald-200">
                                                {p.isAnon ? (
                                                    <span className="text-slate-300 text-sm font-black italic">匿</span>
                                                ) : (
                                                    <span className="text-emerald-500 text-base font-black uppercase">{p.author ? p.author[0] : '？'}</span>
                                                )}
                                            </div>
                                            <div>
                                                <div className="flex items-center space-x-2.5">
                                                    <h3 className="font-black text-slate-900 text-[15px]">{p.isAnon ? '匿名同學' : p.author}</h3>
                                                    {!p.isAnon && p.ig && p.ig !== '未設定' && (
                                                        <a 
                                                            href={`https://instagram.com/${p.ig.replace('@','')}`} 
                                                            target="_blank" 
                                                            rel="noopener noreferrer"
                                                            className="text-[10px] font-black text-red-500 hover:text-white hover:bg-red-500 bg-red-50 px-2.5 py-0.5 rounded-full flex items-center space-x-1 transition-all border border-red-100"
                                                        >
                                                            <Icon name="instagram" className="w-2.5 h-2.5" />
                                                            <span>{p.ig.startsWith('@') ? p.ig : `@${p.ig}`}</span>
                                                        </a>
                                                    )}
                                                </div>
                                                <p className="text-[10px] font-bold text-slate-400 mt-1.5 flex items-center">
                                                    <span className="w-1 h-1 bg-slate-300 rounded-full mr-2"></span>
                                                    {p.date}
                                                </p>
                                            </div>
                                        </div>
                                        {currentUser && p.sid === currentUser.email && (
                                            <button onClick={() => handleDelete(p.id)} className="text-[10px] text-slate-300 font-bold hover:text-red-500 hover:bg-red-50 transition-all px-2.5 py-1.5 rounded-xl border border-transparent hover:border-red-100">刪除</button>
                                        )}
                                    </div>
                                    <div className="relative px-2">
                                        <div className="absolute -left-4 top-0 w-1.5 h-full bg-gradient-to-bottom from-emerald-500/20 to-transparent rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                        <p className="text-[16px] text-slate-700 leading-relaxed whitespace-pre-wrap font-medium tracking-wide">{p.content}</p>
                                    </div>
                                </div>
                            ))
                        )}
                    </main>

                    {/* 發布按鈕 - 紅色醒目 */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-xl px-10 pointer-events-none z-50">
                        <button 
                            onClick={() => currentUser ? (setModalType('post'), setShowModal(true)) : (setModalType('login'), setShowModal(true))} 
                            className="w-full bg-red-500 text-white font-black py-5 rounded-[32px] shadow-2xl shadow-red-500/30 active:scale-95 transition-all flex items-center justify-center space-x-4 pointer-events-auto hover:bg-red-600 hover:shadow-red-600/40 ring-4 ring-white/80"
                        >
                            <div className="bg-white/20 p-1.5 rounded-xl">
                                <Icon name="plus" className="w-5 h-5" />
                            </div>
                            <span className="text-lg tracking-[0.1em]">我要投稿</span>
                        </button>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-emerald-950/50 backdrop-blur-md z-50 flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-md rounded-[48px] p-10 relative shadow-2xl animate-in zoom-in-90 duration-300">
                                <button onClick={() => setShowModal(false)} className="absolute top-8 right-8 w-12 h-12 flex items-center justify-center rounded-2xl bg-slate-50 text-slate-300 hover:text-red-500 hover:bg-red-50 transition-all border border-slate-100 hover:border-red-100">
                                    <Icon name="x" className="w-6 h-6" />
                                </button>

                                {modalType === 'login' && (
                                    <div className="text-center py-6">
                                        <div className="w-28 h-28 flex items-center justify-center mx-auto mb-10 scale-125">
                                            <Icon name="mainLogo" />
                                        </div>
                                        <h2 className="font-black text-2xl mb-4 text-slate-900 tracking-tight">歡迎來到福山投稿</h2>
                                        <p className="text-sm text-slate-400 mb-12 font-bold px-8 leading-relaxed">這是一個專屬於福山同學的匿名空間<br/>請使用學校帳號登入</p>
                                        <div className="flex justify-center">
                                            <div id="google-signin-btn" className="shadow-xl shadow-slate-200 rounded-full overflow-hidden"></div>
                                        </div>
                                    </div>
                                )}

                                {modalType === 'post' && (
                                    <div>
                                        <div className="flex items-center space-x-4 mb-10">
                                            <div className="w-12 h-12 rounded-2xl bg-red-50 flex items-center justify-center border border-red-100 shadow-inner">
                                                <Icon name="plus" className="text-red-500 w-6 h-6" />
                                            </div>
                                            <h2 className="font-black text-2xl text-slate-900">撰寫新的投稿</h2>
                                        </div>
                                        <textarea 
                                            className="w-full h-52 bg-slate-50 rounded-[32px] p-8 mb-8 outline-none text-[16px] font-medium focus:ring-4 focus:ring-red-50 border-2 border-transparent focus:border-red-500/10 transition-all resize-none shadow-inner text-slate-700 leading-relaxed"
                                            placeholder="在此分享你的心情、故事或想說的話..."
                                            value={postContent}
                                            onChange={(e) => setPostContent(e.target.value)}
                                        ></textarea>
                                        <div className="flex items-center justify-between mb-10 px-4">
                                            <label className="flex items-center text-sm font-black text-slate-500 cursor-pointer group">
                                                <div className={`w-7 h-7 rounded-xl border-2 mr-3.5 flex items-center justify-center transition-all ${isAnon ? 'bg-red-500 border-red-500 shadow-lg shadow-red-200' : 'border-slate-200 bg-white group-hover:border-red-200'}`}>
                                                    {isAnon && <div className="w-2.5 h-2.5 bg-white rounded-full"></div>}
                                                </div>
                                                <input type="checkbox" className="hidden" checked={isAnon} onChange={(e) => setIsAnon(e.target.checked)} /> 
                                                <span className={isAnon ? 'text-red-500' : ''}>開啟匿名模式投稿</span>
                                            </label>
                                        </div>
                                        <button 
                                            onClick={handlePost} 
                                            disabled={isSending || !postContent.trim()}
                                            className="w-full bg-red-500 text-white py-5 rounded-[28px] font-black text-lg shadow-2xl shadow-red-500/20 disabled:opacity-50 transition-all hover:bg-red-600 active:scale-[0.98] ring-offset-4 focus:ring-2 focus:ring-red-500"
                                        >
                                            {isSending ? '正在傳送到雲端...' : '確認發布投稿'}
                                        </button>
                                    </div>
                                )}

                                {modalType === 'settings' && (
                                    <div>
                                        <div className="flex items-center space-x-4 mb-10">
                                            <div className="w-12 h-12 rounded-2xl bg-emerald-50 flex items-center justify-center border border-emerald-100">
                                                <Icon name="settings" className="text-emerald-500 w-6 h-6" />
                                            </div>
                                            <h2 className="font-black text-2xl text-slate-900 tracking-tight">個人帳號設定</h2>
                                        </div>
                                        <div className="space-y-10">
                                            <div>
                                                <label className="text-[10px] font-black text-slate-400 uppercase mb-4 block px-2 tracking-[0.25em]">你的 Instagram 使用者名稱</label>
                                                <div className="relative group">
                                                    <div className="absolute left-7 top-1/2 -translate-y-1/2 text-red-400 transition-transform group-focus-within:scale-110">
                                                        <Icon name="instagram" className="w-6 h-6" />
                                                    </div>
                                                    <input 
                                                        type="text" 
                                                        id="setting_ig"
                                                        defaultValue={currentUser.ig !== '未設定' ? currentUser.ig : ''}
                                                        placeholder="例如: fsjh_life"
                                                        className="w-full bg-slate-50 rounded-3xl py-6 pl-16 pr-8 text-base font-black outline-none border-2 border-transparent focus:border-red-500/10 focus:bg-white transition-all shadow-inner"
                                                    />
                                                </div>
                                                <div className="mt-4 px-3 flex items-start space-x-2">
                                                    <div className="w-1 h-1 rounded-full bg-emerald-400 mt-1.5 flex-shrink-0"></div>
                                                    <p className="text-[11px] text-slate-400 font-bold leading-relaxed">填寫後，當你選擇「非匿名」投稿時，其他同學將能看到你的 IG 連結。</p>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => saveIG(document.getElementById('setting_ig').value)}
                                                className="w-full bg-slate-900 text-white py-5 rounded-[28px] font-black text-lg transition-all hover:bg-black active:scale-[0.98] shadow-xl shadow-slate-200"
                                            >
                                                儲存我的設定
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
