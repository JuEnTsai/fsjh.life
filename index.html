<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福山匿名投稿</title>
    <!-- 載入必要套件 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .post-card { transition: all 0.2s ease; }
        .post-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 圖示組件 (SVG 模式避免 DOM 衝突)
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                search: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>,
                logout: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
                x: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
                refresh: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>,
                shield: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                instagram: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
            };
            return icons[name] || null;
        };

        const API_URL = "https://script.google.com/macros/s/AKfycbxNIWjUyOdZM3vvHR9uMdfADYwPnsRJvntQTtoZlBmWj_E_w2L6v8hH_sV4urAYPe-ylw/exec";
        const GOOGLE_CLIENT_ID = "511878323230-0uvd7colr8df751ujpjv9e7trmvp8amm.apps.googleusercontent.com";

        const App = () => {
            const [currentUser, setCurrentUser] = useState(JSON.parse(localStorage.getItem('fushan_user')) || null);
            const [allPosts, setAllPosts] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [status, setStatus] = useState('檢查連線');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('login'); 
            const [showUserMenu, setShowUserMenu] = useState(false);

            const [postContent, setPostContent] = useState('');
            const [category, setCategory] = useState('心情');
            const [isAnon, setIsAnon] = useState(false);
            const [isSending, setIsSending] = useState(false);

            useEffect(() => {
                loadFeed();
                window.handleCredentialResponse = (response) => {
                    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                    const user = { 
                        name: payload.name, 
                        email: payload.email, 
                        picture: payload.picture,
                        ig: localStorage.getItem(`fushan_ig_${payload.email}`) || '未設定'
                    };
                    setCurrentUser(user);
                    localStorage.setItem('fushan_user', JSON.stringify(user));
                    setShowModal(false);
                };
            }, []);

            const loadFeed = async () => {
                setStatus('連線中...');
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    setAllPosts(Array.isArray(data) ? data : []);
                    setIsLoading(false);
                    setStatus('雲端同步中');
                } catch (e) {
                    setStatus('連線失敗');
                    setIsLoading(false);
                }
            };

            const handlePost = async () => {
                if (!postContent.trim()) return alert("請輸入內容！");
                setIsSending(true);
                const userIg = localStorage.getItem(`fushan_ig_${currentUser.email}`) || "未設定";
                const data = {
                    action: "add",
                    id: Date.now().toString(),
                    author: currentUser.name,
                    sid: currentUser.email,
                    ig: userIg,
                    cat: category,
                    content: postContent,
                    isAnon: isAnon,
                    date: new Date().toLocaleString('zh-TW', { hour12: false })
                };
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    setPostContent('');
                    setShowModal(false);
                    setIsSending(false);
                    setTimeout(loadFeed, 500);
                } catch (e) {
                    alert("發送失敗");
                    setIsSending(false);
                }
            };

            const handleDelete = async (postId) => {
                if (!confirm("確定要刪除這則投稿嗎？")) return;
                setStatus('正在刪除...');
                try {
                    await fetch(API_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ action: "delete", id: postId, userEmail: currentUser.email }) 
                    });
                    setTimeout(loadFeed, 1000);
                } catch (e) { alert("刪除失敗"); }
            };

            const saveIG = (newIg) => {
                const updatedUser = { ...currentUser, ig: newIg };
                setCurrentUser(updatedUser);
                localStorage.setItem('fushan_user', JSON.stringify(updatedUser));
                localStorage.setItem(`fushan_ig_${currentUser.email}`, newIg);
                alert("IG 設定成功！");
                setShowModal(false);
            };

            const logout = () => {
                if (confirm("確定要登出嗎？")) {
                    localStorage.removeItem('fushan_user');
                    setCurrentUser(null);
                    setShowUserMenu(false);
                }
            };

            const filteredPosts = allPosts.filter(p => 
                p.content?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.ig?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.author?.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="min-h-screen bg-slate-50 pb-20 font-sans">
                    <nav className="sticky top-0 bg-white/80 backdrop-blur-md border-b px-4 py-4 z-40">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <h1 className="font-black text-2xl text-blue-600 tracking-tighter cursor-pointer" onClick={() => window.location.reload()}>福山匿名投稿</h1>
                            <div className="flex items-center space-x-3">
                                <span className="text-[9px] font-bold text-slate-400 uppercase">{status}</span>
                                {currentUser && (
                                    <div className="relative">
                                        <button onClick={() => setShowUserMenu(!showUserMenu)} className="w-9 h-9 rounded-full border-2 border-blue-100 p-0.5 hover:border-blue-400 transition-all overflow-hidden focus:outline-none">
                                            <img src={currentUser.picture} className="w-full h-full object-cover" alt="profile" />
                                        </button>
                                        {showUserMenu && (
                                            <div className="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl border border-slate-100 py-2 z-50">
                                                <div className="px-4 py-2 border-b border-slate-50 mb-1">
                                                    <p className="text-xs font-bold text-slate-800 truncate">{currentUser.name}</p>
                                                    <p className="text-[10px] text-slate-400 truncate">{currentUser.ig || '未設定 IG'}</p>
                                                </div>
                                                <button onClick={() => { setModalType('settings'); setShowModal(true); setShowUserMenu(false); }} className="w-full flex items-center space-x-2 px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 transition-colors">
                                                    <Icon name="settings" className="w-4 h-4" /> <span>個人設定</span>
                                                </button>
                                                <button onClick={logout} className="w-full flex items-center space-x-2 px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors">
                                                    <Icon name="logout" className="w-4 h-4" /> <span>登出帳號</span>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-2xl mx-auto p-4 space-y-6">
                        <div className="relative">
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <Icon name="search" />
                            </div>
                            <input 
                                type="text" 
                                placeholder="搜尋內容、IG或作者..." 
                                className="w-full bg-white border-none py-4 pl-12 pr-4 rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <button 
                            onClick={() => {
                                if (!currentUser) { setModalType('login'); setShowModal(true); }
                                else { setModalType('post'); setShowModal(true); }
                            }} 
                            className="w-full bg-blue-600 text-white font-black py-4 rounded-[32px] shadow-lg shadow-blue-200 active:scale-95 transition-all flex items-center justify-center space-x-2"
                        >
                            <Icon name="plus" className="w-5 h-5" />
                            <span>發布新投稿</span>
                        </button>

                        <div className="space-y-4">
                            {isLoading ? (
                                <div className="text-center py-20 text-slate-300 flex flex-col items-center">
                                    <div className="animate-spin mb-4"><Icon name="refresh" className="w-8 h-8" /></div> 同步中...
                                </div>
                            ) : filteredPosts.length === 0 ? (
                                <div className="text-center py-20 text-slate-300 font-bold italic">目前沒有投稿</div>
                            ) : (
                                filteredPosts.slice().reverse().map(p => (
                                    <div key={p.id} className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm post-card">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="flex items-center space-x-3">
                                                <div className={`w-10 h-10 rounded-2xl flex items-center justify-center font-black text-sm ${p.isAnon ? 'bg-slate-100 text-slate-400' : 'bg-blue-600 text-white'}`}>
                                                    {p.isAnon ? '匿' : (p.author ? p.author[0] : '？')}
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-slate-800 text-sm">{p.isAnon ? '匿名同學' : p.author}</h3>
                                                    <p className="text-[10px] text-slate-400 font-bold">
                                                        {p.date} {p.ig && p.ig !== '未設定' && p.ig !== '未提供' && `· @${p.ig}`}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end space-y-2">
                                                <span className="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">{p.cat}</span>
                                                {currentUser && p.sid === currentUser.email && (
                                                    <button onClick={() => handleDelete(p.id)} className="text-[10px] text-red-400 font-bold hover:underline">刪除</button>
                                                )}
                                            </div>
                                        </div>
                                        <p className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap">{p.content}</p>
                                    </div>
                                ))
                            )}
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[40px] p-8 relative">
                                <button onClick={() => setShowModal(false)} className="absolute top-6 right-6 text-slate-300 hover:text-slate-600">
                                    <Icon name="x" className="w-6 h-6" />
                                </button>

                                {modalType === 'login' && (
                                    <div className="text-center py-6">
                                        <div className="bg-blue-50 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 text-blue-600">
                                            <Icon name="shield" className="w-8 h-8" />
                                        </div>
                                        <h2 className="font-black text-xl mb-2 text-slate-800">福山身分驗證</h2>
                                        <p className="text-sm text-slate-400 mb-8 font-medium">請使用校內 Google 帳號登入</p>
                                        <div className="flex justify-center min-h-[40px]">
                                            <div 
                                                id="g_id_onload" 
                                                data-client_id={GOOGLE_CLIENT_ID} 
                                                data-callback="handleCredentialResponse"
                                                data-auto_prompt="false"
                                            ></div>
                                            <div className="g_id_signin" data-type="standard"></div>
                                        </div>
                                    </div>
                                )}

                                {modalType === 'post' && (
                                    <div>
                                        <h2 className="font-black text-xl mb-6 text-slate-800">撰寫投稿</h2>
                                        <textarea 
                                            className="w-full h-40 bg-slate-50 rounded-2xl p-4 mb-4 outline-none text-sm focus:ring-2 focus:ring-blue-500 border-none resize-none"
                                            placeholder="今天發生了什麼趣事？"
                                            value={postContent}
                                            onChange={(e) => setPostContent(e.target.value)}
                                        ></textarea>
                                        <div className="flex justify-between items-center mb-8">
                                            <select 
                                                className="bg-slate-100 rounded-xl px-4 py-2 text-xs font-bold outline-none border-none cursor-pointer"
                                                value={category}
                                                onChange={(e) => setCategory(e.target.value)}
                                            >
                                                <option>心情</option><option>尋物</option><option>告白</option>
                                            </select>
                                            <label className="flex items-center text-xs font-bold text-slate-500 cursor-pointer select-none">
                                                <input type="checkbox" className="mr-2" checked={isAnon} onChange={(e) => setIsAnon(e.target.checked)} /> 匿名發布
                                            </label>
                                        </div>
                                        <button 
                                            onClick={handlePost} 
                                            disabled={isSending}
                                            className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg disabled:bg-slate-300 transition-colors"
                                        >
                                            {isSending ? '傳送中...' : '發布到雲端'}
                                        </button>
                                    </div>
                                )}

                                {modalType === 'settings' && (
                                    <div>
                                        <h2 className="font-black text-xl mb-6 text-slate-800 flex items-center space-x-2">
                                            <span className="text-blue-600"><Icon name="settings" className="w-5 h-5" /></span>
                                            <span>個人設定</span>
                                        </h2>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-xs font-black text-slate-400 uppercase mb-2 block px-1">Instagram 帳號</label>
                                                <div className="relative">
                                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                                        <Icon name="instagram" className="w-4 h-4" />
                                                    </div>
                                                    <input 
                                                        type="text" 
                                                        id="setting_ig"
                                                        defaultValue={currentUser.ig !== '未設定' ? currentUser.ig : ''}
                                                        placeholder="例如: fsjh_life"
                                                        className="w-full bg-slate-50 rounded-2xl py-4 pl-11 pr-4 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 border-none"
                                                    />
                                                </div>
                                            </div>
                                            <button 
                                                onClick={() => saveIG(document.getElementById('setting_ig').value)}
                                                className="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg mt-4 transition-colors"
                                            >
                                                儲存設定
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
