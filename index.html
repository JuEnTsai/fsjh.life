<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福山匿名投稿系統</title>
    <!-- Google Login API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --fushan-green: #00a67e;
            --fushan-light-green: #f0f9f4; 
            --fushan-soft-red: #ff9999;
            --bg-main: #f2fdf7; 
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(#d1fae5 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            z-index: -1;
            opacity: 0.6;
        }

        .header-card {
            background: white;
            border-radius: 0 0 2.5rem 2.5rem;
            padding: 1.25rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 166, 126, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 900px;
            margin: 0 auto;
        }

        .post-card {
            background: white;
            border-radius: 2rem;
            padding: 1.75rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 166, 126, 0.05);
            transition: transform 0.3s ease;
        }
        .post-card:hover {
            transform: translateY(-3px);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 50, 40, 0.2);
            backdrop-filter: blur(8px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 3rem;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .custom-textarea {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 2rem;
            padding: 1.5rem;
            min-height: 180px;
            outline: none;
            resize: none;
            font-size: 1rem;
            color: #475569;
        }

        .btn-primary {
            background: var(--fushan-soft-red);
            color: white;
            width: 100%;
            padding: 1.25rem;
            border-radius: 2rem;
            font-weight: 900;
            font-size: 1.1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 15px rgba(255, 153, 153, 0.3);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }

        .fab {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            width: 85%;
            max-width: 400px;
            padding: 1.25rem 2rem;
            border-radius: 2.5rem;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .fab:hover {
            transform: translateX(-50%) translateY(-5px);
            background: #0f172a;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 使用者頭像樣式 */
        .user-avatar-btn {
            width: 48px;
            height: 48px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
            overflow: hidden;
            transition: all 0.2s;
        }
        .user-avatar-btn:hover {
            background: #f1f5f9;
            color: #94a3b8;
        }
        .user-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <!-- 登入提示彈窗 -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-content text-center">
            <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500 mx-auto mb-6">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">需要登入</h2>
            <p class="text-slate-500 font-medium mb-8">為了維護社群品質，投稿前請先使用 Google 帳號登入驗證。</p>
            <div class="flex justify-center" id="google-login-btn-modal"></div>
            <button onclick="toggleModal('login-modal', false)" class="mt-6 text-slate-400 font-bold text-sm hover:text-slate-600 transition-colors">先看看就好</button>
        </div>
    </div>

    <!-- 投稿彈窗 -->
    <div id="post-modal" class="modal-overlay">
        <div class="modal-content">
            <button onclick="toggleModal('post-modal', false)" class="absolute top-6 right-6 w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 hover:bg-slate-100 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div class="flex items-center space-x-4 mb-8">
                <div class="w-12 h-12 bg-red-50 rounded-2xl flex items-center justify-center text-red-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v12m6-6H6"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">撰寫新的投稿</h2>
            </div>

            <div class="mb-6">
                <textarea id="post-content" class="custom-textarea" placeholder="在此分享你的心情、故事或想說的話..."></textarea>
            </div>

            <div class="flex items-center space-x-3 mb-8 px-2">
                <input type="checkbox" id="anon-toggle" checked class="w-6 h-6 rounded-full border-slate-200 text-slate-800 focus:ring-0 cursor-pointer">
                <label for="anon-toggle" class="text-slate-500 font-bold cursor-pointer">開啟匿名模式投稿</label>
            </div>

            <button id="submit-btn" onclick="submitPost()" class="btn-primary">
                <span id="btn-text">確認發布投稿</span>
            </button>
        </div>
    </div>

    <header class="pt-6 px-4 mb-10">
        <div class="header-card">
            <div class="flex items-center space-x-4">
                <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-white font-black text-xs shadow-lg shadow-emerald-100">FSJH</div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 tracking-tight">福山匿名投稿</h1>
                    <div class="flex items-center">
                        <span id="sync-dot" class="w-2 h-2 bg-green-400 rounded-full mr-2"></span>
                        <span id="sync-text" class="text-green-500 text-xs font-bold">已同步</span>
                    </div>
                </div>
            </div>
            
            <!-- 頭像與登入按鈕區塊 -->
            <div id="auth-section">
                <button onclick="checkAuthAndOpenModal()" class="user-avatar-btn" id="user-display">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </button>
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 pb-40">
        <div id="posts-container" class="space-y-6">
            <div class="flex flex-col items-center justify-center py-24 opacity-30">
                <div class="loader !border-emerald-400 !border-b-transparent mb-4"></div>
                <p class="font-black text-xs uppercase tracking-widest text-emerald-800">正在同步校園心情...</p>
            </div>
        </div>
    </main>

    <button onclick="checkAuthAndOpenModal()" class="fab">
        <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path>
        </svg>
        <span>新建投稿</span>
    </button>

    <div id="toast" class="fixed bottom-32 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur text-white px-8 py-4 rounded-3xl text-sm font-bold opacity-0 transition-all pointer-events-none z-[1000] shadow-2xl"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxNIWjUyOdZM3vvHR9uMdfADYwPnsRJvntQTtoZlBmWj_E_w2L6v8hH_sV4urAYPe-ylw/exec";
        let currentUser = null;

        window.onload = () => {
            fetchPosts();
        };

        // --- Google 驗證邏輯 ---
        function handleCredentialResponse(response) {
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));

            currentUser = JSON.parse(jsonPayload);
            updateAuthUI();
            toggleModal('login-modal', false);
            showToast(`歡迎回來，${currentUser.name}！`);
        }

        function updateAuthUI() {
            const userDisplay = document.getElementById('user-display');
            if (currentUser && userDisplay) {
                userDisplay.innerHTML = `<img src="${currentUser.picture}" class="user-avatar-img" title="點擊登出">`;
                userDisplay.onclick = confirmLogout;
            }
        }

        function confirmLogout() {
            if(confirm("確定要登出嗎？")) {
                currentUser = null;
                location.reload();
            }
        }

        function checkAuthAndOpenModal() {
            if (!currentUser) {
                toggleModal('login-modal', true);
                setTimeout(() => {
                    google.accounts.id.renderButton(
                        document.getElementById("google-login-btn-modal"),
                        { theme: "outline", size: "large", text: "signin_with" }
                    );
                }, 100);
                return;
            }
            toggleModal('post-modal', true);
        }

        // --- 投稿與資料抓取 ---
        async function fetchPosts() {
            setSyncStatus(false);
            try {
                const response = await fetch(`${GAS_URL}?action=getPosts`);
                const posts = await response.json();
                
                // 排序邏輯：將抓取到的投稿進行反轉，讓最新的排在最前面
                // (假設 GAS 回傳的是照時間順序排列的陣列)
                const sortedPosts = posts.reverse();
                
                renderPosts(sortedPosts);
                setSyncStatus(true);
            } catch (error) {
                console.error("抓取失敗:", error);
                document.getElementById('posts-container').innerHTML = `<div class="text-center py-20"><p class="text-slate-400 font-bold">暫時無法獲取內容</p></div>`;
            }
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr === "剛剛") return "剛剛";
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            const ss = String(date.getSeconds()).padStart(2, '0');
            return `${y}/${m}/${d} ${hh}:${mm}:${ss}`;
        }

        function renderPosts(posts) {
            const container = document.getElementById('posts-container');
            if (!posts || posts.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 font-bold py-20">目前還沒有人投稿喔</p>`;
                return;
            }

            container.innerHTML = posts.map(post => {
                const isAnon = post.isAnon === true || post.isAnon === "true";
                const displayDate = formatDate(post.date);
                const avatar = isAnon 
                    ? `<div class="w-10 h-10 rounded-xl bg-slate-600 flex items-center justify-center text-white"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg></div>`
                    : `<div class="w-10 h-10 rounded-xl overflow-hidden border border-slate-100"><img src="${post.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(post.author)}" class="w-full h-full object-cover"></div>`;

                return `
                    <div class="post-card">
                        <div class="flex items-center space-x-3 mb-4">
                            ${avatar}
                            <div>
                                <div class="font-black text-slate-800 text-sm">${isAnon ? '匿名同學' : post.author}</div>
                                <div class="text-[9px] text-slate-400 font-black tracking-widest">${displayDate}</div>
                            </div>
                        </div>
                        <p class="text-slate-600 font-medium leading-relaxed">${post.content}</p>
                    </div>
                `;
            }).join('');
        }

        async function submitPost() {
            if (!currentUser) {
                showToast("請先登入後再發布！");
                return;
            }

            const content = document.getElementById('post-content').value.trim();
            const isAnon = document.getElementById('anon-toggle').checked;
            
            if (!content) {
                showToast("請輸入點內容吧！");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerHTML = `<span class="loader"></span>`;

            try {
                const formData = new URLSearchParams();
                formData.append('action', 'addPost');
                formData.append('content', content);
                formData.append('isAnon', isAnon);
                formData.append('author', isAnon ? "匿名同學" : currentUser.name);
                formData.append('avatar', isAnon ? "" : currentUser.picture);

                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                showToast("發布成功！✨");
                document.getElementById('post-content').value = "";
                toggleModal('post-modal', false);
                setTimeout(fetchPosts, 1500);
            } catch (error) {
                showToast("發布失敗，請稍後再試。");
            } finally {
                btn.disabled = false;
                btnText.innerText = "確認發布投稿";
            }
        }

        // --- UI 控制 ---
        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('active', show);
        }

        function setSyncStatus(isSynced) {
            const dot = document.getElementById('sync-dot');
            const text = document.getElementById('sync-text');
            if (isSynced) {
                dot.className = "w-2 h-2 bg-green-400 rounded-full mr-2";
                text.innerText = "已同步";
            } else {
                dot.className = "w-2 h-2 bg-orange-400 rounded-full mr-2 animate-pulse";
                text.innerText = "同步中...";
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            t.style.transform = "translate(-50%, -20px)";
            setTimeout(() => {
                t.style.opacity = "0";
                t.style.transform = "translate(-50%, 0px)";
            }, 3000);
        }
    </script>
</body>
</html>
